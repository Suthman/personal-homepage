title: "Christoph Mies"
subtitle: "IT Architect"
description: "Blog · Publications · Professional Journey"
url: "https://christoph-mies.de"
og_image: "/assets/images/author-photo.jpg" # image used when sharing links. Can be a logo or portait. ATTENTION: also check og_image when updating!

minimal_mistakes_skin: "default" # "default" "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
search: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
encoding: "utf-8" # no official jekyll standard, but: might help and will not break anything


# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
locale: "en_GB"
timezone: "Europe/Berlin" # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

plugins:
  - jekyll-include-cache
  - jekyll-sitemap

include:
  - _pages

# the following files are not available via the website
exclude:
  - README.md
  - CNAME
  - LICENSE
  - scripts/
  - .vscode/
  - Gemfile
  - Gemfile.lock
  - exclude/

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: single
      author_profile: true
      sidebar:
        nav: "main"
        position: left

# site properties
email: www-christoph-mies-de@web.de # ATTENTION: Also check mail adress in author-info when changing!

author:
  name   : "Christoph"
#  bio    : "Enthusiastischer Web-Entwickler & Jekyll-Nutzer. Hier teile ich meine Projekte und Gedanken."
  avatar : "/assets/images/author-photo.jpg" # Path to photo. ATTENTION: also check og_image when updating!
  location: "Lohmar, Germany"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:www-christoph-mies-de@web.de" # ATTENTION: Also check mail adress in site properties when changing!
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://de.linkedin.com/in/christoph-mies-459042177"
    - label: "XING"
      # icon: "fab fa-fw fa-xing" original icon, but lower one is similar to the others
      icon: "fab fa-fw fa-xing-square"
      url: "https://www.xing.com/profile/Christoph_Mies3"
#    - label: "GitHub"
#      icon: "fab fa-fw fa-github"
#      url: "https://github.com"

atom_feed:
  hide: true

footer:
  extra_footer_content: '© 2026 Christoph Mies &#124; <strong>As of March 2026: Site under construction</strong> &#124; <a href="/legal/">Imprint, disclaimer and privacy policy</a> &#124; <a href="/legal/">Impressum, Datenschutzerklärung und Haftungsausschluss</a>'

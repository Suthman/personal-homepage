name: Deploy Jekyll site

on:
  push:
    branches: ["**"]      # Build on every push to any branch
  workflow_dispatch:      # Enable manual triggers via the "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Load full git history for accurate "last modified" timestamps

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # Caches gems to speed up future builds

      - name: Restore timestamps # substitutes file system timestamp by git timestamp
        run: |
          git ls-files -z | xargs -0 -n1 -I{} touch -d "$(git log -1 --format="@%ct" "{}")" "{}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    # Only deploy automatically on 'main' OR when manually triggered via 'workflow_dispatch'
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

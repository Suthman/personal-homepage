name: Deploy Jekyll site

on:
  push:
    branches: ["**"]      # Build on every push to any branch
  workflow_dispatch:      # Enable manual triggers via the "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Load full git history for accurate "last modified" timestamps

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # Caches gems to speed up future builds

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Fix PDF Timestamps in Sitemap
        run: |
          python3 -c "
          import re, subprocess, os
          sitemap_path = '_site/sitemap.xml'
          if not os.path.exists(sitemap_path): 
              print('❌ ERROR: sitemap.xml not found'); exit(1)
          
          with open(sitemap_path, 'r') as f: 
              content = f.read()
          
          # Match asset paths in <loc> tags
          asset_pattern = r'<loc>\s*https?://[^<]+?(/assets/[^<]+?\.(?:pdf|bib))\s*</loc>'
          matches = re.findall(asset_pattern, content)
          print(f'Found {len(matches)} assets in sitemap.')
          
          for asset_path in matches:
              local_path = asset_path.lstrip('/')
              if os.path.exists(local_path):
                  git_date = subprocess.getoutput(f'git log -1 --format=%cI -- \"{local_path}\"')
                  if git_date:
                      # We use \g<1> to safely separate the group from the following date digits
                      search_pattern = rf'(<loc>\s*https?://[^<]+?{re.escape(asset_path)}\s*</loc>\s*<lastmod>)[^<]+(</lastmod>)'
                      new_content = re.sub(search_pattern, rf'\g<1>{git_date}\g<2>', content, flags=re.DOTALL)
                      
                      if new_content != content:
                          print(f'✅ Successfully patched {local_path} to {git_date}')
                          content = new_content
                      else:
                          print(f'⚠️ Regex match failed for {local_path}')
              else:
                  print(f'⚠️ File not found on disk: {local_path}')
          
          with open(sitemap_path, 'w') as f: 
              f.write(content)
          
          lines = content.splitlines()
          print('\n--- DEBUG: FIRST 10 LINES ---')
          print('\n'.join(lines[:10]))
          print('\n--- DEBUG: LAST 50 LINES ---')
          print('\n'.join(lines[-50:]))
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    # Only deploy automatically on 'main' OR when manually triggered via 'workflow_dispatch'
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
